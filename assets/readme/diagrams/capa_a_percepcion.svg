<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="800" viewBox="0 0 1560 800" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6B7B"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1560" height="800" fill="#ffffff"/>
  <text x="780" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#2B3A4A">Capa A — Percepción (GPU)</text>
  <text x="780" y="70" text-anchor="middle" font-size="15" fill="#6E8198">detección / segmentación → tracking · piezas intercambiables</text>

  <!-- panel -->
  <rect x="40" y="92" width="1480" height="688" rx="16" fill="#EDF2F7" stroke="#B6C7D6" stroke-width="1.5"/>

  <!-- fachada -->
  <rect x="560" y="120" width="440" height="78" rx="10" fill="#E3EBF2" stroke="#3E5C76" stroke-width="2"/>
  <text x="780" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#2B3A4A">run_inference — interfaz única</text>
  <text x="780" y="176" text-anchor="middle" font-size="14" fill="#41566B">mode = "segmentation" | "tracking"</text>

  <!-- ===== rama izquierda: segmentación ===== -->
  <rect x="250" y="262" width="300" height="74" rx="10" fill="#ffffff" stroke="#5B7C99" stroke-width="1.8"/>
  <text x="400" y="292" text-anchor="middle" font-size="16" font-weight="600" fill="#2B3A4A">pipeline.py</text>
  <text x="400" y="316" text-anchor="middle" font-size="13" fill="#7A8895">per-frame · obj_id NO estable</text>

  <rect x="270" y="392" width="260" height="86" rx="10" fill="#ffffff" stroke="#5B7C99" stroke-width="1.8"/>
  <text x="400" y="422" text-anchor="middle" font-size="16" font-weight="700" fill="#2B3A4A">DETECTOR <tspan font-size="12" font-weight="600" fill="#3E7C9A">· intercambiable</tspan></text>
  <text x="400" y="447" text-anchor="middle" font-size="13" fill="#7A8895">sam3_text</text>
  <text x="400" y="466" text-anchor="middle" font-size="13" fill="#7A8895">yolo_sam3</text>

  <rect x="240" y="534" width="320" height="80" rx="10" fill="#F4F8FB" stroke="#5B7C99" stroke-width="1.6"/>
  <text x="400" y="566" text-anchor="middle" font-size="15" font-weight="600" fill="#2B3A4A">overlay + mp4 + JSON</text>
  <text x="400" y="590" text-anchor="middle" font-size="13" fill="#7A8895">segmentación (obj_id no estable)</text>

  <!-- ===== rama derecha: tracking ===== -->
  <rect x="1010" y="262" width="300" height="74" rx="10" fill="#ffffff" stroke="#5B7C99" stroke-width="1.8"/>
  <text x="1160" y="292" text-anchor="middle" font-size="16" font-weight="600" fill="#2B3A4A">tracking.py</text>
  <text x="1160" y="316" text-anchor="middle" font-size="13" fill="#7A8895">streaming · obj_id ESTABLE</text>

  <rect x="1030" y="392" width="260" height="86" rx="10" fill="#ffffff" stroke="#5B7C99" stroke-width="1.8"/>
  <text x="1160" y="422" text-anchor="middle" font-size="16" font-weight="700" fill="#2B3A4A">DETECTOR <tspan font-size="12" font-weight="600" fill="#3E7C9A">· intercambiable</tspan></text>
  <text x="1160" y="447" text-anchor="middle" font-size="13" fill="#7A8895">sam3_text</text>
  <text x="1160" y="466" text-anchor="middle" font-size="13" fill="#7A8895">yolo_sam3</text>

  <rect x="1030" y="534" width="260" height="86" rx="10" fill="#ffffff" stroke="#5B7C99" stroke-width="1.8"/>
  <text x="1160" y="564" text-anchor="middle" font-size="16" font-weight="700" fill="#2B3A4A">TRACKER <tspan font-size="12" font-weight="600" fill="#3E7C9A">· intercambiable</tspan></text>
  <text x="1160" y="589" text-anchor="middle" font-size="13" fill="#7A8895">bytetrack</text>
  <text x="1160" y="608" text-anchor="middle" font-size="13" fill="#7A8895">botsort</text>

  <!-- tracking JSON (la moneda) -->
  <rect x="980" y="672" width="360" height="92" rx="10" fill="#E3EBF2" stroke="#3E5C76" stroke-width="2.2"/>
  <text x="1160" y="702" text-anchor="middle" font-size="16" font-weight="700" fill="#2B3A4A">tracking JSON</text>
  <text x="1160" y="724" text-anchor="middle" font-size="13" fill="#41566B">Track / TrackObservation</text>
  <text x="1160" y="743" text-anchor="middle" font-size="13" fill="#41566B">obj_id estable [+ máscaras]</text>
  <text x="936" y="668" text-anchor="end" font-size="13" font-style="italic" fill="#8A6D2E">la «moneda»</text>
  <text x="936" y="686" text-anchor="end" font-size="13" font-style="italic" fill="#8A6D2E">del post-proceso</text>

  <!-- ===== flechas ===== -->
  <g stroke="#5A6B7B" stroke-width="2.2" fill="none" marker-end="url(#arrowA)">
    <!-- split desde la fachada -->
    <path d="M780,198 V232 H400 V260"/>
    <path d="M780,198 V232 H1160 V260"/>
    <!-- columna izquierda -->
    <line x1="400" y1="336" x2="400" y2="390"/>
    <line x1="400" y1="478" x2="400" y2="532"/>
    <!-- columna derecha -->
    <line x1="1160" y1="336" x2="1160" y2="390"/>
    <line x1="1160" y1="478" x2="1160" y2="532"/>
    <line x1="1160" y1="620" x2="1160" y2="670"/>
  </g>
  <!-- etiquetas de enrutamiento -->
  <text x="414" y="370" font-size="12" fill="#8A6D2E">get_detector</text>
  <text x="1174" y="370" font-size="12" fill="#8A6D2E">get_detector</text>
  <text x="1174" y="512" font-size="12" fill="#8A6D2E">get_tracker</text>
</svg>
